      <stop offset="60%" stop-color="#ff4d00" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="240" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="239" rx="13.5" fill="none" stroke="#21262d" stroke-width="1"/>

  <circle cx="1080" cy="120" r="180" fill="url(#orbGlow)"/>

  <g opacity="0.45">
