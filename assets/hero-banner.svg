<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="220" viewBox="0 0 1160 220" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Ray Lin — Agents Developer &amp; Moderator @ Puffer Labs</title>
  <desc id="hero-desc">Terminal-style hero banner: RAY LIN, Agents developer building AI agents at the edge of large language models and Web3.</desc>
  <defs>
    <linearGradient id="hero-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#160b04"/>
      <stop offset="62%" stop-color="#0c0806"/>
      <stop offset="100%" stop-color="#221004"/>
    </linearGradient>
    <linearGradient id="hero-stroke" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="50%" stop-color="#ff8a22"/>
      <stop offset="100%" stop-color="#ff4d00"/>
    </linearGradient>
    <filter id="hero-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1160" height="220" rx="18" fill="#050403"/>
