<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" role="img" aria-labelledby="hero-m-title hero-m-desc">
  <title id="hero-m-title">Ray Lin — GPTs Developer &amp; Moderator @ Puffer Labs</title>
  <desc id="hero-m-desc">Mobile terminal-style hero banner.</desc>
  <defs>
    <linearGradient id="hero-m-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#160b04"/>
      <stop offset="64%" stop-color="#0c0806"/>
      <stop offset="100%" stop-color="#221004"/>
    </linearGradient>
    <linearGradient id="hero-m-stroke" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="50%" stop-color="#ff8a22"/>
      <stop offset="100%" stop-color="#ff4d00"/>
    </linearGradient>
    <filter id="hero-m-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="420" height="320" rx="16" fill="#050403"/>
  <rect x="12" y="12" width="396" height="296" rx="14" fill="url(#hero-m-panel)" stroke="url(#hero-m-stroke)" stroke-width="1.6"/>

