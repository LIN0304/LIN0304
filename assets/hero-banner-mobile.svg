<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="hero-m-title hero-m-desc">
  <title id="hero-m-title">Ray Lin &#8212; Agentic Systems Engineer</title>
  <desc id="hero-m-desc">Ray Lin, agentic systems engineer. Building the infrastructure, workflows, and evaluation systems that let frontier models execute complex tasks reliably. Creator of UniBench, a benchmark-aware model intelligence layer. Based in Taipei, Taiwan.</desc>
  <defs>
    <linearGradient id="hbm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#170c05"/>
      <stop offset="55%" stop-color="#0c0805"/>
      <stop offset="100%" stop-color="#1f0e05"/>
    </linearGradient>
    <linearGradient id="hbm-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hbm-name" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ea"/>
      <stop offset="100%" stop-color="#ffd9ad"/>
    </linearGradient>
    <linearGradient id="hbm-shine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="150" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-190 0;430 0" dur="5.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="hbm-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff7a1a" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hbm-orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff7a1a" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0"/>
    </radialGradient>
    <filter id="hbm-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hbm-nameglow" x="-25%" y="-35%" width="150%" height="170%">
      <feGaussianBlur stdDeviation="0.85" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hbm-clip"><rect width="420" height="360" rx="16"/></clipPath>
    <clipPath id="hbm-kick"><rect x="24" y="47" width="285" height="15">
      <animate attributeName="width" values="0;285" dur="0.85s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="420" height="360" rx="16" fill="url(#hbm-bg)"/>

  <g clip-path="url(#hbm-clip)">
    <circle cx="385" cy="85" r="150" fill="url(#hbm-orb)">
      <animate attributeName="r" values="150;160;150" dur="9s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#3b2111" stroke-width="1" opacity="0.26">
      <path d="M0 72 H420"/>
      <path d="M0 144 H420"/>
      <path d="M0 216 H420"/>
      <path d="M0 288 H420"/>
    </g>

    <!-- grid twinkles -->
    <g fill="#ffb057">
<circle cx="64" cy="72" r="0.9" opacity="0.2"><animate attributeName="opacity" values="0.12;0.7;0.12" dur="3.8s" begin="-0.6s" repeatCount="indefinite"/></circle>
<circle cx="204" cy="144" r="0.9" opacity="0.2"><animate attributeName="opacity" values="0.12;0.7;0.12" dur="4.4s" begin="-1.8s" repeatCount="indefinite"/></circle>
<circle cx="330" cy="216" r="1.0" opacity="0.2"><animate attributeName="opacity" values="0.12;0.7;0.12" dur="3.5s" begin="-2.6s" repeatCount="indefinite"/></circle>
<circle cx="150" cy="288" r="0.9" opacity="0.2"><animate attributeName="opacity" values="0.12;0.7;0.12" dur="4.7s" begin="-1.0s" repeatCount="indefinite"/></circle>
    </g>

    <!-- rising embers -->
    <g fill="#ff9a3d">
      <circle cx="120" cy="368" r="1.4">
        <animate attributeName="cy" values="368;-12" dur="13s" begin="-3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.55;0.55;0" dur="13s" begin="-3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="368" r="1.6">
        <animate attributeName="cy" values="368;-12" dur="15s" begin="-8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0.5;0" dur="15s" begin="-8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="360" cy="368" r="1.3">
        <animate attributeName="cy" values="368;-12" dur="17s" begin="-5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.45;0.45;0" dur="17s" begin="-5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- agent constellation -->
    <g stroke="#ff7a1a" stroke-width="1" opacity="0.30">
      <path d="M286 96 L324 70"/>
      <path d="M324 70 L356 102"/>
      <path d="M356 102 L388 72"/>
      <path d="M324 70 L388 72"/>
    </g>
    <g fill="#ffb057">
      <circle cx="286" cy="96" r="2.2" opacity="0.75"><animate attributeName="opacity" values="0.55;0.95;0.55" dur="3.4s" begin="-0.3s" repeatCount="indefinite"/></circle>
      <circle cx="324" cy="70" r="2.2" opacity="0.75"><animate attributeName="opacity" values="0.55;0.95;0.55" dur="3.8s" begin="-1.4s" repeatCount="indefinite"/></circle>
      <circle cx="388" cy="72" r="2.2" opacity="0.75"><animate attributeName="opacity" values="0.55;0.95;0.55" dur="3.1s" begin="-2.2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- data packets travelling between agents -->
    <circle r="1.8" fill="#ffd08a">
      <animateMotion path="M286 96 L324 70 L356 102" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" fill="#ffb057">
      <animateMotion path="M388 72 L356 102" dur="2.4s" begin="-1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" fill="#ffd08a">
      <animateMotion path="M356 102 L324 70 L286 96" dur="2.8s" begin="-1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.8s" begin="-1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- hub node with rotating orbit + counter-orbiting satellite -->
    <circle cx="356" cy="102" r="7" fill="#ff4d00" opacity="0.28"/>
    <g>
      <circle cx="356" cy="102" r="13" fill="none" stroke="#ff8a22" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="4 5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 356 102" to="360 356 102" dur="10s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="369" cy="102" r="1.5" fill="#ffb057" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" from="0 356 102" to="-360 356 102" dur="6.5s" repeatCount="indefinite"/>
    </g>
    <circle cx="356" cy="102" r="3" fill="#ff8a22" filter="url(#hbm-glow)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- sweeping scan band -->
    <rect x="0" y="-60" width="420" height="56" fill="url(#hbm-band)">
      <animate attributeName="y" values="-60;366" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="0.75" y="0.75" width="418.5" height="358.5" rx="15.25" fill="none" stroke="#ff7a1a" stroke-opacity="0.5" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.42;0.58;0.42" dur="7s" repeatCount="indefinite"/>
  </rect>

  <rect x="24" y="30" width="44" height="3" rx="1.5" fill="#ff7a1a"/>
  <rect x="72" y="30" width="64" height="3" rx="1.5" fill="url(#hbm-accent)"/>
  <rect x="24" y="30" width="20" height="3" rx="1.5" fill="#ffd9ad">
    <animate attributeName="x" values="24;116" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <text x="24" y="58" font-size="10" font-weight="800" letter-spacing="2.2" fill="#ffb057"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" textLength="285" lengthAdjust="spacingAndGlyphs" clip-path="url(#hbm-kick)" xml:space="preserve">&gt;_ AGENT SKILLS &#8226; HARNESSES &#8226; EVALS</text>
  <rect x="317" y="49" width="6" height="10" fill="#ffb057">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

