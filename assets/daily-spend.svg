<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-labelledby="ds-title">
  <title id="ds-title">Daily Spend — Cost by Day</title>
  <defs>
    <linearGradient id="ds-panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#160b04"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="ds-area" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffb057" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ds-stroke" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#ffb057"/>
      <stop offset="100%" stop-color="#ffd08a"/>
    </linearGradient>
    <pattern id="ds-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#3b1f0d"/>
    </pattern>
    <filter id="ds-glow">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ds-peakGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

