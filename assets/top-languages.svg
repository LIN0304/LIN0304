<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="tl-title tl-desc">
  <title id="tl-title">Top languages across LIN0304 public repositories</title>
  <desc id="tl-desc">Share of LIN0304 public repositories by primary language, weighted by repository count: Python 36.2%, JavaScript 18.8%, HTML 18.8%, TypeScript 13.0%, Solidity 2.9%, other 10.3%.</desc>
  <defs>
    <linearGradient id="tl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#170c05"/>
      <stop offset="55%" stop-color="#0c0805"/>
      <stop offset="100%" stop-color="#1f0e05"/>
    </linearGradient>
    <linearGradient id="tl-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="tl-clip-card"><rect width="495" height="195" rx="12"/></clipPath>
    <clipPath id="tl-clip-bar"><rect width="451" height="12" rx="6"/></clipPath>
  </defs>

  <rect width="495" height="195" rx="12" fill="url(#tl-bg)"/>
  <g clip-path="url(#tl-clip-card)">
    <g stroke="#3b2111" stroke-width="1" opacity="0.26">
      <path d="M0 48 H495"/>
      <path d="M0 96 H495"/>
      <path d="M0 144 H495"/>
    </g>
  </g>
  <rect x="0.75" y="0.75" width="493.5" height="193.5" rx="11.25" fill="none" stroke="#ff7a1a" stroke-opacity="0.45" stroke-width="1.5"/>

  <rect x="22" y="18" width="40" height="3" rx="1.5" fill="#ff7a1a"/>
  <rect x="66" y="18" width="80" height="3" rx="1.5" fill="url(#tl-accent)"/>

  <text x="22" y="44" font-size="9.5" font-weight="800" letter-spacing="2.2" fill="#ffb057"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">MOST USED // BY REPO COUNT</text>

  <text x="22" y="70" font-size="19" font-weight="800" fill="#fff2df" letter-spacing="-0.4"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Top languages</text>

  <text x="473" y="44" font-size="9.5" font-weight="800" letter-spacing="1.2" fill="#cc6b2c" text-anchor="end"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">69 TYPED REPOS</text>

  <path d="M22 84 H473" stroke="#3b2111" stroke-width="1" opacity="0.8"/>

  <g transform="translate(22,96)">
    <rect width="451" height="12" rx="6" fill="#1b0e07" stroke="#4b2a13" stroke-width="1"/>
    <g clip-path="url(#tl-clip-bar)">
      <rect x="0"   y="0" width="163" height="12" fill="#3572A5"/>
      <rect x="163" y="0" width="85"  height="12" fill="#f1e05a"/>
      <rect x="248" y="0" width="85"  height="12" fill="#e34c26"/>
      <rect x="333" y="0" width="59"  height="12" fill="#3178c6"/>
      <rect x="392" y="0" width="13"  height="12" fill="#AA6746"/>
      <rect x="405" y="0" width="46"  height="12" fill="#7a5c40"/>
    </g>
  </g>

  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="600">
    <g transform="translate(22,132)">
      <circle cx="6" cy="-4" r="5.5" fill="#3572A5"/>
      <text x="20" y="0" fill="#fff2df">Python</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">36.2%</text>
    </g>
    <g transform="translate(22,154)">
      <circle cx="6" cy="-4" r="5.5" fill="#f1e05a"/>
      <text x="20" y="0" fill="#fff2df">JavaScript</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">18.8%</text>
    </g>
    <g transform="translate(22,176)">
      <circle cx="6" cy="-4" r="5.5" fill="#e34c26"/>
      <text x="20" y="0" fill="#fff2df">HTML</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">18.8%</text>
    </g>

    <g transform="translate(257,132)">
      <circle cx="6" cy="-4" r="5.5" fill="#3178c6"/>
      <text x="20" y="0" fill="#fff2df">TypeScript</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">13.0%</text>
    </g>
    <g transform="translate(257,154)">
      <circle cx="6" cy="-4" r="5.5" fill="#AA6746"/>
      <text x="20" y="0" fill="#fff2df">Solidity</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">2.9%</text>
    </g>
    <g transform="translate(257,176)">
      <circle cx="6" cy="-4" r="5.5" fill="#7a5c40"/>
      <text x="20" y="0" fill="#fff2df">Other</text>
      <text x="216" y="0" fill="#ffb057" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="800">10.3%</text>
    </g>
