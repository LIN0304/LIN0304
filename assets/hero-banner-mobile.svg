  <text x="24" y="142" font-size="14" font-weight="600" fill="#ffca88"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Agentic Systems Engineer<animate attributeName="opacity" values="0;0;1" keyTimes="0;0.25;1" dur="0.6s" fill="freeze"/></text>
  <text x="24" y="162" font-size="14" font-weight="600" fill="#ffca88"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Building UniBench<animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;1" dur="0.75s" fill="freeze"/></text>

