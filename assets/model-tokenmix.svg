<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="JetBrains Mono, ui-monospace, Menlo, Consolas, monospace">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#3b1f0d"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="540" fill="#1a0f08" rx="14"/>
  <rect width="1200" height="540" fill="url(#grid)" rx="14"/>
  <rect x="6" y="6" width="1188" height="528" fill="none" stroke="#d97706" stroke-width="1.5" rx="12"/>

  <!-- ====== [02] MODEL SHARE ====== -->
  <text x="32" y="48" font-size="18" font-weight="700" fill="#f97316" filter="url(#glow)">[02] COST_BY_MODEL // MODEL_SHARE</text>
  <line x1="24" y1="62" x2="1176" y2="62" stroke="#7c2d12" stroke-width="1"/>

  <!-- Table header -->
  <text x="48"   y="92" font-size="12" fill="#92400e">&gt; MODEL</text>
  <text x="640"  y="92" font-size="12" fill="#92400e" text-anchor="end">TOKENS</text>
  <text x="780"  y="92" font-size="12" fill="#92400e" text-anchor="end">COST</text>
  <text x="1160" y="92" font-size="12" fill="#92400e" text-anchor="end">SHARE</text>
  <line x1="24" y1="102" x2="1176" y2="102" stroke="#3b1f0d" stroke-width="1"/>

  <!-- Row 1: gpt-5.5 -->
  <rect x="48" y="116" width="10" height="14" fill="#f97316"/>
  <text x="68"   y="128" font-size="14" fill="#fcd34d" font-weight="700">gpt-5.5</text>
  <text x="640"  y="128" font-size="14" fill="#fbbf24" text-anchor="end">4,386,359,912</text>
  <text x="780"  y="128" font-size="14" fill="#fbbf24" text-anchor="end" font-weight="700">$3,726.680</text>
  <rect x="820" y="118" width="280" height="10" fill="#3b1f0d" rx="2"/>
  <rect x="820" y="118" width="280" height="10" fill="#f97316" rx="2"/>
  <text x="1160" y="128" font-size="13" fill="#f97316" text-anchor="end" font-weight="700">100.00%</text>

  <!-- Row 2: gpt-5.3-codex-spark -->
  <rect x="48" y="148" width="10" height="14" fill="#92400e"/>
  <text x="68"   y="160" font-size="14" fill="#fcd34d">gpt-5.3-codex-spark</text>
  <text x="640"  y="160" font-size="14" fill="#fbbf24" text-anchor="end">164,171</text>
  <text x="780"  y="160" font-size="14" fill="#fbbf24" text-anchor="end">$0.000</text>
  <rect x="820" y="150" width="280" height="10" fill="#3b1f0d" rx="2"/>
  <rect x="820" y="150" width="0.04" height="10" fill="#92400e" rx="2"/>
  <text x="1160" y="160" font-size="13" fill="#92400e" text-anchor="end">&lt; 0.01%</text>

  <line x1="24" y1="200" x2="1176" y2="200" stroke="#3b1f0d" stroke-width="1"/>

  <!-- ====== [03] TOKEN MIX ====== -->
  <text x="32" y="240" font-size="18" font-weight="700" fill="#f97316" filter="url(#glow)">[03] TOKEN_MIX // INPUT_CACHE_OUTPUT</text>
  <line x1="24" y1="254" x2="1176" y2="254" stroke="#7c2d12" stroke-width="1"/>

  <!-- Legend -->
  <rect x="48" y="276" width="12" height="12" fill="#22c55e"/>
  <text x="66" y="287" font-size="12" fill="#fcd34d">Cached input</text>
  <text x="200" y="287" font-size="12" fill="#fbbf24" font-weight="700">4,154,448,640</text>

  <rect x="370" y="276" width="12" height="12" fill="#3b82f6"/>
  <text x="388" y="287" font-size="12" fill="#fcd34d">Non-cached input</text>
  <text x="540" y="287" font-size="12" fill="#fbbf24" font-weight="700">212,486,024</text>
  <rect x="700" y="276" width="12" height="12" fill="#f97316"/>
  <text x="718" y="287" font-size="12" fill="#fcd34d">Output</text>
  <text x="800" y="287" font-size="12" fill="#fbbf24" font-weight="700">19,589,419</text>

  <!-- Stacked bar -->
  <rect x="30" y="320" width="1140" height="28" fill="#3b1f0d" rx="3"/>
  <rect x="30" y="320" width="1079.6866402614025" height="28" fill="#22c55e" rx="3"/>
  <rect x="1109.6866402614025" y="320" width="55.22232701258373" height="28"  fill="#3b82f6"/>
  <rect x="1164.9089672739863" y="320" width="5.091032726013646" height="28" fill="#f97316"/>

  <!-- Percent labels on bar -->
  <text x="569.8433201307013" y="339" font-size="13" fill="#0f0f0f" text-anchor="middle" font-weight="700">94.71%</text>
  <text x="1234.9089672739863" y="339" font-size="11" fill="#fcd34d" font-weight="700">4.84% / 0.45%</text>

  <!-- ====== CACHE HIT RATE BOX ====== -->
  <rect x="30" y="380" width="560" height="120" fill="none" stroke="#d97706" stroke-width="1.5" rx="6"/>
  <text x="48" y="408" font-size="12" fill="#92400e">&gt; CACHE_HIT_RATE</text>
  <text x="48" y="466" font-size="56" font-weight="700" fill="#f97316" filter="url(#glow)" font-family="JetBrains Mono, monospace">95.1%</text>
  <text x="48" y="490" font-size="12" fill="#fcd34d">cached / (cached + non_cached)</text>

  <rect x="610" y="380" width="560" height="120" fill="none" stroke="#d97706" stroke-width="1.5" rx="6"/>
  <text x="628" y="408" font-size="12" fill="#92400e">&gt; VOLUME</text>
  <text x="628" y="446" font-size="22" font-weight="700" fill="#fbbf24">4.15B cached / 4.37B input</text>
  <text x="628" y="470" font-size="13" fill="#fcd34d">non-cached: 212.49M  &#183;  output: 19.59M</text>
  <text x="628" y="490" font-size="11" fill="#92400e">savings vs no-cache: $18,694.601</text>

</svg>
