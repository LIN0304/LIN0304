<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="hero-m-title hero-m-desc">
  <title id="hero-m-title">Ray Lin — Agents Developer &amp; Moderator at Puffer Labs</title>
  <desc id="hero-m-desc">Ray Lin, Agents Developer and Moderator at Puffer Labs. Building AI agents at the edge of large language models and Web3. Based in Taipei, Taiwan.</desc>
  <defs>
    <linearGradient id="bg-m" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine-m" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb-m" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff7a1a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="420" height="360" rx="14" fill="url(#bg-m)"/>
  <rect x="0.5" y="0.5" width="419" height="359" rx="13.5" fill="none" stroke="#21262d" stroke-width="1"/>

  <circle cx="380" cy="80" r="120" fill="url(#orb-m)"/>

  <rect x="24" y="28" width="44" height="3" rx="1.5" fill="#ff7a1a"/>
