    <rect x="940" y="40" width="1" height="160" fill="#21262d"/>
    <rect x="980" y="40" width="1" height="160" fill="#21262d"/>
    <rect x="1020" y="40" width="1" height="160" fill="#21262d"/>
    <rect x="1060" y="40" width="1" height="160" fill="#21262d"/>
    <rect x="1100" y="40" width="1" height="160" fill="#21262d"/>
    <rect x="1140" y="40" width="1" height="160" fill="#21262d"/>
