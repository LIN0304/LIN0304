<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="tl-title tl-desc">
  <title id="tl-title">Top languages across LIN0304 public repositories</title>
  <desc id="tl-desc">Share of LIN0304 public repositories by primary language, weighted by repository count: Python 36.2%, JavaScript 18.8%, HTML 18.8%, TypeScript 13.0%, Solidity 2.9%, other 10.3%.</desc>
  <defs>
    <linearGradient id="tl-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="tl-accentLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="495" height="195" rx="10" fill="url(#tl-bg)"/>
  <rect x="0.5" y="0.5" width="494" height="194" rx="9.5" fill="none" stroke="#21262d" stroke-width="1"/>

  <rect x="22" y="20" width="40" height="3" rx="1.5" fill="#ff7a1a"/>
  <rect x="66" y="20" width="80" height="3" rx="1.5" fill="url(#tl-accentLine)"/>

  <text x="22" y="46" font-size="10" font-weight="700" letter-spacing="2.4" fill="#8b949e"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">MOST USED &#8226; BY REPO COUNT</text>

  <text x="22" y="72" font-size="20" font-weight="800" fill="#f0f6fc" letter-spacing="-0.4"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Top languages</text>

  <text x="473" y="46" font-size="10" font-weight="600" letter-spacing="1.2" fill="#7d8590" text-anchor="end"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">69 TYPED REPOS</text>

  <g transform="translate(22,90)">
    <rect width="451" height="10" rx="5" fill="#1c2129"/>
    <clipPath id="tl-clip">
      <rect width="451" height="10" rx="5"/>
    </clipPath>
    <g clip-path="url(#tl-clip)">
      <rect x="0"   y="0" width="163" height="10" fill="#3572A5"/>
      <rect x="163" y="0" width="85"  height="10" fill="#f1e05a"/>
      <rect x="248" y="0" width="85"  height="10" fill="#e34c26"/>
      <rect x="333" y="0" width="59"  height="10" fill="#3178c6"/>
      <rect x="392" y="0" width="13"  height="10" fill="#AA6746"/>
      <rect x="405" y="0" width="46"  height="10" fill="#7d8590"/>
    </g>
  </g>

  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="600">
    <g transform="translate(22,128)">
      <circle cx="6" cy="-4" r="6" fill="#3572A5"/>
      <text x="20" y="0" fill="#c9d1d9">Python</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">36.2%</text>
    </g>
    <g transform="translate(22,150)">
      <circle cx="6" cy="-4" r="6" fill="#f1e05a"/>
      <text x="20" y="0" fill="#c9d1d9">JavaScript</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">18.8%</text>
    </g>
    <g transform="translate(22,172)">
      <circle cx="6" cy="-4" r="6" fill="#e34c26"/>
      <text x="20" y="0" fill="#c9d1d9">HTML</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">18.8%</text>
    </g>

    <g transform="translate(257,128)">
      <circle cx="6" cy="-4" r="6" fill="#3178c6"/>
      <text x="20" y="0" fill="#c9d1d9">TypeScript</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">13.0%</text>
    </g>
    <g transform="translate(257,150)">
      <circle cx="6" cy="-4" r="6" fill="#AA6746"/>
      <text x="20" y="0" fill="#c9d1d9">Solidity</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">2.9%</text>
    </g>
    <g transform="translate(257,172)">
      <circle cx="6" cy="-4" r="6" fill="#7d8590"/>
      <text x="20" y="0" fill="#c9d1d9">Other</text>
      <text x="216" y="0" fill="#8b949e" text-anchor="end">10.3%</text>
    </g>
  </g>
</svg>
