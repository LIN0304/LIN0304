<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="al-title al-desc">
<title id="al-title">Agent runtime — the execution loop</title>
<desc id="al-desc">Animated diagram of an agent execution loop: a task flows through planner, benchmark-aware router across OpenAI and Claude models, executor with tools, critic and verifier, then ships. Feedback loops return to the planner; memory, tools, evals and traces support the rail.</desc>
<defs>
<linearGradient id="al-bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#170c05"/><stop offset="55%" stop-color="#0c0805"/><stop offset="100%" stop-color="#1f0e05"/>
</linearGradient>
<linearGradient id="al-accent" x1="0" x2="1" y1="0" y2="0">
<stop offset="0%" stop-color="#ff7a1a"/><stop offset="100%" stop-color="#ff7a1a" stop-opacity="0"/>
</linearGradient>
<clipPath id="al-clip"><rect width="1200" height="380" rx="16"/></clipPath>
</defs>
