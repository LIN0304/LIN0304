<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="72" viewBox="0 0 1200 72" role="img" aria-label="particle collider — counter-propagating particle beams collide at the center in a flash of rings and fragments">
  <defs>
    <linearGradient id="pc-streakL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd08a" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffd08a" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="pc-streakR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd08a" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffd08a" stop-opacity="0"/>
    </linearGradient>
    <filter id="pc-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- end caps + injector rings -->
  <path d="M10 36 h8 M1182 36 h8" stroke="#ff7a1a" stroke-opacity="0.8" stroke-width="2"/>
  <path d="M14 30 v12 M1186 30 v12" stroke="#ff7a1a" stroke-opacity="0.6" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.4;0.85;0.4" dur="3.6s" repeatCount="indefinite"/>
  </path>
  <g>
    <circle cx="46" cy="36" r="13" fill="none" stroke="#ff8a22" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="3 4"/>
    <animateTransform attributeName="transform" type="rotate" from="0 46 36" to="360 46 36" dur="10s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="1154" cy="36" r="13" fill="none" stroke="#ff8a22" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="3 4"/>
    <animateTransform attributeName="transform" type="rotate" from="0 1154 36" to="-360 1154 36" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- beamline -->
  <line x1="64" y1="36" x2="1136" y2="36" stroke="#673110" stroke-width="1.2"/>
  <line x1="64" y1="36" x2="1136" y2="36" stroke="#3b2111" stroke-width="1.2" stroke-dasharray="2 6" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="64" y1="36" x2="1136" y2="36" stroke="#3b2111" stroke-width="1.2" stroke-dasharray="2 6" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;16" dur="1.4s" repeatCount="indefinite"/>
  </line>

  <!-- accelerator gates (blink as bunches pass) -->
  <g fill="#1b0e07" stroke="#673110">
    <rect x="200" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="0.76s" repeatCount="indefinite"/></rect>
    <rect x="340" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="1.54s" repeatCount="indefinite"/></rect>
    <rect x="480" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="2.33s" repeatCount="indefinite"/></rect>
    <rect x="1000" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="0.76s" repeatCount="indefinite"/></rect>
    <rect x="860" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="1.54s" repeatCount="indefinite"/></rect>
    <rect x="720" y="29" width="3" height="14"><animate attributeName="stroke" values="#673110;#ff7a1a;#673110" keyTimes="0;0.06;0.3" dur="1.5s" begin="2.33s" repeatCount="indefinite"/></rect>
  </g>

  <!-- counter-propagating bunches with streak trails -->
  <rect y="35.2" width="26" height="1.6" rx="0.8" fill="url(#pc-streakL)" opacity="0">
    <animate attributeName="x" values="38;574" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9" keyTimes="0;0.06;1" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <circle cy="36" r="2" fill="#ffd08a" filter="url(#pc-glow)" opacity="0">
    <animate attributeName="cx" values="64;600" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.06;1" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <rect y="35.2" width="26" height="1.6" rx="0.8" fill="url(#pc-streakL)" opacity="0">
    <animate attributeName="x" values="38;574" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9" keyTimes="0;0.06;1" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
  </rect>
  <circle cy="36" r="2" fill="#ffd08a" filter="url(#pc-glow)" opacity="0">
    <animate attributeName="cx" values="64;600" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.06;1" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
  </circle>
  <rect y="35.2" width="26" height="1.6" rx="0.8" fill="url(#pc-streakR)" opacity="0">
    <animate attributeName="x" values="1136;600" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9" keyTimes="0;0.06;1" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <circle cy="36" r="2" fill="#ffd08a" filter="url(#pc-glow)" opacity="0">
    <animate attributeName="cx" values="1136;600" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.06;1" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <rect y="35.2" width="26" height="1.6" rx="0.8" fill="url(#pc-streakR)" opacity="0">
    <animate attributeName="x" values="1136;600" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9" keyTimes="0;0.06;1" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
  </rect>
  <circle cy="36" r="2" fill="#ffd08a" filter="url(#pc-glow)" opacity="0">
    <animate attributeName="cx" values="1136;600" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.06;1" dur="3s" begin="-1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- collision: flash, shockwave rings, fragments -->
  <circle cx="600" cy="36" r="2.5" fill="#ff4d00">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="36" r="1" fill="#ffd9ad" filter="url(#pc-glow)" opacity="0">
    <animate attributeName="r" values="1;8;2;1" keyTimes="0;0.08;0.3;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.9;0;0" keyTimes="0;0.08;0.35;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="36" r="3" fill="none" stroke="#ff8a22" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="3;26" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="36" r="3" fill="none" stroke="#ff8a22" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="3;26" dur="3s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;0" dur="3s" begin="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="36" r="3" fill="none" stroke="#ffb057" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="3;34" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <g fill="#ffca88">
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L658,14" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L664,46" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L640,6" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L646,62" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L542,14" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L536,46" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L560,6" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="1.3" opacity="0"><animateMotion path="M600,36 L554,62" dur="1.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.08;1" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ambient drifting particles -->
  <g fill="#ffb057">
    <circle cy="18" r="1" opacity="0.2"><animate attributeName="cx" values="80;1120" dur="26s" begin="-8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.08;0.3;0.08" dur="5s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cy="56" r="1" opacity="0.2"><animate attributeName="cx" values="1120;80" dur="31s" begin="-14s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.08;0.3;0.08" dur="6s" begin="-2.5s" repeatCount="indefinite"/></circle>
    <circle cy="12" r="1" opacity="0.2"><animate attributeName="cx" values="200;1000" dur="24s" begin="-5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.08;0.3;0.08" dur="4.4s" begin="-0.7s" repeatCount="indefinite"/></circle>
    <circle cy="62" r="1" opacity="0.2"><animate attributeName="cx" values="1000;200" dur="29s" begin="-18s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.08;0.3;0.08" dur="5.5s" begin="-3.2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
